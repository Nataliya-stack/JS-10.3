<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    body {             
      background-image: url("./img/bg3.png");
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      background-attachment: fixed;
      width: 100%; 
      max-width: 1200px; 
      margin: 0 auto;
      min-height: 100vh; 
      display: flex;
      flex-direction: column;
      align-items: center;    
      overflow-x: hidden;
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;      
      padding: 0 16px; 
    }   
  </style>  
  <link rel="shortcut icon" href="shopping-cart.svg" type="image/svg">
  <title>JS - 10.3</title>
</head>

<body> 

      <h1 class="font-bold text-4xl md:text-6xl my-8 md:my-15 text-center text-cyan-950">
        Factorial de un número
      </h1>   

      <div id="resultado" class="bg-cyan-950 text-cyan-100 w-full md:w-2/4 p-6 md:p-10 rounded-lg text-xl md:text-3xl text-center tracking-widest box-border">
        
        <div class="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-10 mb-6 text-xl md:text-2xl">
          <label for="numero">Ingrese un número:</label>
          <input type="number" id="numero" placeholder="Ej. 5" class="border-cyan-100 border-2 rounded-lg px-4 py-2 w-full md:w-auto text-cyan-950 bg-white">
        </div>
        
        <button id="btn" class="bg-cyan-100 text-cyan-950 font-bold py-2 px-6 rounded-lg text-lg md:text-2xl hover:bg-cyan-200 transition-colors cursor-pointer w-full md:w-auto">
          Calcular el factorial
        </button>
        
        <p id="mensaje" class="mt-6 text-xl md:text-2xl text-pink-200 wrap-break-word"></p>    
      </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="./js/app.js"></script>
</body>

</html>
